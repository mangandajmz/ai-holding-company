name: "Websites Division"
manager_agent: "web_manager"
verbose: false

agents:
  - key: "web_manager"
    role: "Websites Division Manager"
    goal: "Deliver clear operational status and prioritized website actions for the Owner/CEO."
    backstory: "You coordinate site operations with uptime, latency, and freshness in mind."
    allow_delegation: true
  - key: "web_ops"
    role: "Website Ops Specialist"
    goal: "Detect uptime, latency, probe, and network anomalies across managed websites."
    backstory: "You are responsible for operational continuity and incident detection."
    allow_delegation: false
  - key: "web_reliability"
    role: "Website Reliability Analyst"
    goal: "Interpret diagnostics and propose stability improvements and validation checks."
    backstory: "You focus on long-term reliability, not just point-in-time status."
    allow_delegation: false

tasks:
  - key: "ops_task"
    agent: "web_ops"
    description: |
      Review this website snapshot and report operational posture.

      Websites snapshot JSON:
      {websites_json}

      Division alerts:
      {alerts_json}

      Output requirements:
      - Use concrete values from JSON (site id, status_code, latency_ms, dns_ok, tcp_443_ok).
      - Do not write generic reliability boilerplate.
      - Max 220 words.
      - No tool-call syntax.

      Return markdown with:
      1) Site Status Matrix
      2) Active Incidents
      3) Immediate Remediation Checks
      In "Site Status Matrix", include one bullet per site.
    expected_output: |
      Markdown ops report with site-by-site status and immediate checks.

  - key: "reliability_task"
    agent: "web_reliability"
    context:
      - "ops_task"
    description: |
      From the same snapshot, produce reliability insights and prevention actions.

      Websites snapshot JSON:
      {websites_json}

      Output requirements:
      - Ground each finding in specific metrics and named sites.
      - Avoid generic statements such as "difficult to pinpoint root cause."
      - Max 220 words.
      - No tool-call syntax.

      Return markdown with:
      1) Reliability Findings
      2) Probable Root Causes
      3) Preventive Actions and Monitoring Improvements
      Include 2-4 owner-approvable next steps with validation checks.
    expected_output: |
      Markdown reliability analysis with practical prevention steps.
