name: "Trading Bots Division"
manager_agent: "trading_manager"
verbose: false

agents:
  - key: "trading_manager"
    role: "Trading Division Manager"
    goal: "Deliver a concise manager-level trading division brief with clear priorities and risk controls."
    backstory: "You run trading operations for AI Holding Company and coordinate monitor, analyst, and executor specialists."
    allow_delegation: true
  - key: "trading_monitor"
    role: "Trading Monitor"
    goal: "Detect runtime health issues, reliability risks, and operational blockers from bot telemetry."
    backstory: "You specialize in bot uptime, process health, and error surveillance."
    allow_delegation: false
  - key: "trading_analyst"
    role: "Trading Analyst"
    goal: "Interpret PnL, win/loss behavior, and trend shifts to produce actionable performance insights."
    backstory: "You translate raw bot KPIs into practical insights for leadership decisions."
    allow_delegation: false
  - key: "trading_executor"
    role: "Trading Executor Planner"
    goal: "Propose low-risk next actions and command sequences for the owner to approve."
    backstory: "You create safe execution plans and never perform unapproved risk changes."
    allow_delegation: false

tasks:
  - key: "monitor_task"
    agent: "trading_monitor"
    description: |
      Review this trading bot snapshot and identify operational health risks.

      Trading bots snapshot JSON:
      {bots_json}

      Division alerts:
      {alerts_json}

      Return compact markdown with sections:
      1) Bot Health Matrix
      2) Reliability Risks
      3) Immediate Monitoring Actions
      Do not output function-call JSON or tool-call syntax.
    expected_output: |
      Markdown report with explicit bot-by-bot status, failure signals, and monitoring actions.

  - key: "analyst_task"
    agent: "trading_analyst"
    context:
      - "monitor_task"
    description: |
      Using the same snapshot and monitor report, analyze trading performance quality.

      Trading bots snapshot JSON:
      {bots_json}

      Focus on:
      - PnL concentration and outliers
      - Trade volume realism
      - Variance between historical totals and recent 24h signals
      - Whether metrics suggest stale, delayed, or healthy data

      Return compact markdown with:
      1) Performance Findings
      2) Risk Interpretation
      3) Owner Decision Options
      Do not output function-call JSON or tool-call syntax.
    expected_output: |
      Markdown analysis with concrete findings and suggested owner-level decisions.

  - key: "executor_task"
    agent: "trading_executor"
    context:
      - "monitor_task"
      - "analyst_task"
    description: |
      Draft a safe execution plan (proposal only) from the monitor and analyst outputs.

      Constraints:
      - No autonomous risk parameter changes
      - No unattended strategy launch
      - Keep recommendations copy-paste ready
      - Only propose commands available in this stack:
        `python scripts/tool_router.py read_bot_logs ...`
        `python scripts/tool_router.py run_trading_script ...`
        `python scripts/tool_router.py run_divisions ...`
        `python scripts/tool_router.py daily_brief --force`
      - Do not propose SQL queries or undefined scripts.

      Return markdown with:
      1) Proposed Commands
      2) Expected Outcomes
      3) Rollback/Validation Checks
      Do not output function-call JSON or tool-call syntax.
    expected_output: |
      Markdown runbook of owner-approvable commands and verification steps.
