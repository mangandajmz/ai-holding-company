company:
  name: "AI Holding Company"
  timezone: "America/Vancouver"
  owner_role: "Owner/CEO"
  github_repo: "mangandajmz/ai-holding-company"

chat:
  preferred_app: "telegram" # Change to "slack" if needed
  morning_brief_time_local: "08:00"

bridge:
  provider: "telegram"
  observer_mode: true
  state_file: "state/telegram_bridge_state.json"
  audit_log_path: "state/bridge_audit.jsonl"
  telegram:
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    owner_chat_id_env: "TELEGRAM_OWNER_CHAT_ID"
    owner_user_id_env: "TELEGRAM_OWNER_USER_ID"
    poll_interval_sec: 3
    allowed_chat_ids: []
    allowed_user_ids: []

paths:
  reports_dir: "reports"
  state_dir: "state"
  memory_dir: "memory"
  heartbeat_file: "HEARTBEAT.md"

memory:
  enabled: true
  ollama_base_url: "http://127.0.0.1:11434"
  embedding_model: "nomic-embed-text"

trading_bots:
  - id: "mt5_desk"
    name: "MT5 Agentic Trading Desk"
    monitor: false
    repo_path: "C:/Users/james/OneDrive/Documents/Claude/Projects/AI Holding Company/ai-holding-company/mt5-agentic-desk"
    log_paths:
      - "logs/runtime/runtime.log"
      - "logs/runtime/runtime_events.jsonl"
    commands:
      health: "python tests/test_mt5_connection.py"
      report: "python \"C:/Users/james/OneDrive/Documents/Claude/Projects/AI Holding Company/ai-holding-company/scripts/project_reports.py\" mt5 --repo ."
      execute: "python main.py --mode trading --quiet"
    kpi_patterns:
      pnl:
        - "(?i)pnl\\s*[=:]\\s*([+-]?\\d+(?:\\.\\d+)?)"
      trades:
        - "(?i)trade(?:s)?\\s*[=:]\\s*(\\d+)"
      errors:
        - "(?i)(error|exception|traceback|\\[warn\\]|\\[ERROR\\])"
      drawdown:
        - "(?i)drawdown\\s*[=:]\\s*([+-]?\\d+(?:\\.\\d+)?)"

  - id: "polymarket"
    name: "Polymarket Copy Trading Bot"
    monitor: false
    repo_path: "C:/Users/james/OneDrive/Documents/Claude/Projects/AI Holding Company/ai-holding-company/polymarket-bot"
    log_paths:
      - "bot.log"
      - "paper_trades.csv"
    commands:
      health: "python \"C:/Users/james/OneDrive/Documents/Claude/Projects/AI Holding Company/ai-holding-company/scripts/project_reports.py\" polymarket --repo ."
      report: "python \"C:/Users/james/OneDrive/Documents/Claude/Projects/AI Holding Company/ai-holding-company/scripts/project_reports.py\" polymarket --repo ."
      execute: "python paper_trading_bot.py"
    remote_readonly:
      enabled: true
      read_only: true
      host: "167.234.219.208"
      port: 22
      user: "aicg_ro"
      ssh_key_path: "C:/Users/james/.ssh/ai_capital_vps"
      cache_repo_path: "repo"
      files:
        - remote_path: "/home/ubuntu/polymarket-bot/bot.log"
          local_rel_path: "bot.log"
          required: true
        - remote_path: "/home/ubuntu/polymarket-bot/paper_trades.csv"
          local_rel_path: "paper_trades.csv"
          required: true
        - remote_path: "/home/ubuntu/polymarket-bot/bot_state.db"
          local_rel_path: "bot_state.db"
          required: false
      # SECURITY: .env is NOT synced remotely; place STARTING_BANKROLL in this config instead.
      starting_bankroll: 300.0
      service_check_cmd: "systemctl is-active polymarket-bot || true"
      service_check_retries: 3
      service_check_backoff_sec: 1.2
    kpi_patterns:
      pnl:
        - "(?i)pnl\\s*[=:]\\s*([+-]?\\d+(?:\\.\\d+)?)"
      trades:
        - "(?i)trades?\\s*[=:]\\s*(\\d+)"
      errors:
        - "(?i)(error|exception|traceback|\\[warn\\]|\\[ERROR\\])"
      drawdown:
        - "(?i)drawdown\\s*[=:]\\s*([+-]?\\d+(?:\\.\\d+)?)"

