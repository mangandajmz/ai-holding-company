promotion_framework:
  reference_property: "freetraderhub"
  required_gates:
    - "business_case_defined"
    - "target_product_defined"
    - "feasibility_validated"
    - "roi_case_defined"
    - "metrics_defined"
    - "metrics_trackable"
  min_live_metrics: 2
  promotion_policy: "Promote when all required gates pass and at least two live metrics are actively tracked."

kpis:
  heartbeat:
    required:
      - "pnl"
      - "trades"
      - "errors"
      - "uptime"
      - "latency_ms"
  thresholds:
    max_error_lines_last_scan: 5
    max_website_latency_ms: 3000

phase2:
  enabled: true
  crewai:
    ollama_model: "ollama/llama3.2:latest"
    ollama_base_url: "http://127.0.0.1:11434"
    temperature: 0.1
    agent_max_iter: 1
  targets:
    trading:
      mt5:
        max_cycle_age_minutes: 180
        min_active_strategies: 1
        min_best_pf: 1.3
        monitor_window_utc:
          start_hour: 7
          end_hour: 21
          run_weekends: false
      polymarket:
        daily_loss_cap_usd: 60
        max_warning_lines_24h: 2
        max_open_positions: 12
        max_trade_data_age_hours: 72
        min_resolved_trades_24h: 1
    websites:
      snapshot_uptime_ratio_min: 1.0
      max_latency_ms: 500
      max_sitemap_age_days: 14
      max_research_report_age_days: 8
  reports:
    markdown_latest: "reports/phase2_divisions_latest.md"
    json_latest: "reports/phase2_divisions_latest.json"
  divisions:
    trading:
      spec_file: "crews/trading_bots_division.yaml"
    websites:
      spec_file: "crews/websites_division.yaml"
    content_studio:
      spec_file: "crews/content_studio.yaml"

phase3:
  enabled: true
  soul_file: "SOUL.md"
  targets_file: "config/targets.yaml"
  baseline_state_file: "state/phase3_company_baseline.json"
  r12_counter_state_file: "state/r12_property_counters.json"
  property_metric_feed_file: "state/property_metric_feed.json"
  property_metric_sources_dir: "state/property_metrics"
  property_metric_memory_file: "state/property_metric_memory.json"
  property_kpi_history_file: "state/property_kpi_history.jsonl"
  reports:
    markdown_latest: "reports/phase3_holding_latest.md"
    json_latest: "reports/phase3_holding_latest.json"
  ceo:
    spec_file: "crews/holding_ceo.yaml"
    agent_max_iter: 1
    ollama_model: "ollama/llama3.2:latest"
    ollama_base_url: "http://127.0.0.1:11434"
    temperature: 0.1

