company:
  # Enabled capital-risk projects always count toward portfolio health.
  monthly_pnl_growth_pct:
    target_min: 10.0
    amber_min: 0.0
  max_drawdown_pct:
    target_max: 3.0
    amber_max: 5.0
  website_uptime_ratio:
    target_min: 0.999
    amber_min: 0.99
  division_green_ratio:
    target_min: 0.67
    amber_min: 0.50
  max_alerts_per_heartbeat:
    target_max: 0
    amber_max: 2

property_maturity:
  ready_ratio:
    target_min: 1.0
    amber_min: 0.67
  live_metrics_ratio:
    target_min: 1.0
    amber_min: 0.67

freshness:
  daily_brief_max_age_hours: 6
  remote_bot_check_max_age_hours: 6

trading:
  mt5:
    max_cycle_age_minutes: 180
    min_active_strategies: 1
    min_best_pf: 1.3
    monitor_window_utc:
      start_hour: 7
      end_hour: 21
      run_weekends: false
  polymarket:
    daily_loss_cap_usd: 60
    max_warning_lines_24h: 2
    max_open_positions: 12
    max_trade_data_age_hours: 72
    min_resolved_trades_24h: 1

websites:
  snapshot_uptime_ratio_min: 1.0
  max_latency_ms: 500
  max_sitemap_age_days: 14
  max_research_report_age_days: 8

content_studio:
  # Light division - measure brief intake and draft completion
  briefs_per_week:
    target: 2
    alert_threshold_min: 0 # Alert if no briefs received
    alert_threshold_max: 10 # Alert if >10 (overload)

  draft_completion_rate:
    target: 1.0 # 100% of briefs result in draft
    alert_threshold: 0.8 # Alert if <80%

  ceo_approval_wait_time_hours:
    target: 24 # CEO reviews within 24h
    alert_threshold: 48 # Alert if >48h pending

  division_health:
    target: "GREEN"
    red_threshold: "ANY draft without PENDING_CEO_APPROVAL status"
    amber_threshold: "Any CEO-approval item pending >48 hours"

semantic_memory:
  # Semantic search readiness tracking
  vector_store_size:
    target: 100 # Target 100+ indexed documents for rich search
    alert_threshold_min: 0
    alert_threshold_max: 1000

  embedding_model:
    target: "nomic-embed-text" # Required model
    alert_threshold: "mismatch" # Alert if different model used

  search_latency_ms:
    target: 100 # Semantic search should return in <100ms
    alert_threshold: 500

freetraderhub:
  # Master KPI Dashboard targets from roadmap.md
  # Traffic milestones gate revenue — email list is the #1 leading indicator.
  #
  # Phase 1 (D30):  baseline measured, 50+ email subs, first affiliate commission
  # Phase 2 (D90):  5,000 visitors/mo, 500 email subs, $3,660 MRR
  # Phase 3 (D180): 15,000 visitors/mo, 2,500 email subs, $7,300 MRR

  monthly_visitors:
    d30_target: null        # baseline measure — no numeric target yet
    d90_target: 5000
    d180_target: 15000
    amber_below_pct: 0.7    # AMBER if <70% of milestone target

  email_list_size:
    d30_target: 50
    d90_target: 500
    d180_target: 2500
    # Unlock gates (from roadmap):
    #   50  → affiliate program apply (Day 1 action — no-traffic required)
    #   100 → rule alert demand survey
    #   250 → launch rule alert paid tier ($7/mo)
    #   500 → Pro tool waitlist launch email
    # 1,000 → course pre-sell
    # 2,500 → media kit for sponsored listings

  total_mrr_usd:
    d30_target: 300         # first affiliate commissions
    d60_target: 1320
    d90_target: 3660
    d180_target: 7300
    amber_below_pct: 0.7

  # Stream-level MRR targets (from Master KPI Dashboard)
  affiliate_mrr_usd:
    d30_target: 300
    d90_target: 1500
    d180_target: 2500

  alert_mrr_usd:
    d30_target: 0
    d90_target: 700
    d180_target: 1200

  pro_mrr_usd:
    d30_target: 0
    d90_target: 960
    d180_target: 1500

time_saved:
  weekly_hours:
    target: 5 # R9 guardrail: 5 hours/week minimum
    alert_threshold: 2.5 # AMBER if <2.5
    red_threshold: 0 # RED if <0 (net negative)

  checkin_frequency:
    target: 12 # Check-ins every 2 hours (12/day)
    alert_threshold: 6 # Alert if <6/day

  r9_status:
    target: "GREEN"
    red_trigger: "Two consecutive weeks with <5 hours/week saved"
