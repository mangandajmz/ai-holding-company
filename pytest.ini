[pytest]
# Include worktree tests alongside the main-repo test suites.
# .claude/ is excluded by pytest's default hidden-dir filter;
# listing the path explicitly re-enables discovery.
testpaths =
    tests
    mt5-agentic-desk
    polymarket-bot
    .claude/worktrees/upbeat-germain/tests
    .claude/worktrees/crazy-hodgkin-ce2f3d/tests
norecursedirs =
    .git
    __pycache__
    .venv
    venv
    node_modules
    build
    dist
    .mypy_cache
